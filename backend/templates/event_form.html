{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} Event | NexusEvent{% endblock %}
{% block page_title %}{% if editing %}Edit Event{% else %}New Event{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Title</label>
        <input type="text" name="title" value="{{ record.title|default:'' }}">
      </div>
      <div class="form-group">
        <label>Event Type</label>
        <select name="event_type">
          <option value="conference" {% if record.event_type == 'conference' %}selected{% endif %}>Conference</option>
          <option value="workshop" {% if record.event_type == 'workshop' %}selected{% endif %}>Workshop</option>
          <option value="seminar" {% if record.event_type == 'seminar' %}selected{% endif %}>Seminar</option>
          <option value="webinar" {% if record.event_type == 'webinar' %}selected{% endif %}>Webinar</option>
          <option value="social" {% if record.event_type == 'social' %}selected{% endif %}>Social</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Venue</label>
        <input type="text" name="venue" value="{{ record.venue|default:'' }}">
      </div>
      <div class="form-group">
        <label>Date</label>
        <input type="date" name="date" value="{{ record.date|date:'Y-m-d'|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Capacity</label>
        <input type="number" name="capacity" value="{{ record.capacity|default:'0' }}">
      </div>
      <div class="form-group">
        <label>Registered</label>
        <input type="number" name="registered" value="{{ record.registered|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Price</label>
        <input type="number" step="0.01" name="price" value="{{ record.price|default:'0' }}">
      </div>
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="upcoming" {% if record.status == 'upcoming' %}selected{% endif %}>Upcoming</option>
          <option value="live" {% if record.status == 'live' %}selected{% endif %}>Live</option>
          <option value="completed" {% if record.status == 'completed' %}selected{% endif %}>Completed</option>
          <option value="cancelled" {% if record.status == 'cancelled' %}selected{% endif %}>Cancelled</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea name="description">{{ record.description|default:'' }}</textarea>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} Event</button>
      <a href="/events/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
