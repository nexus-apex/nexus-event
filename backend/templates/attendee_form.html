{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} Attendee | NexusEvent{% endblock %}
{% block page_title %}{% if editing %}Edit Attendee{% else %}New Attendee{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Name</label>
        <input type="text" name="name" value="{{ record.name|default:'' }}">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" value="{{ record.email|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Phone</label>
        <input type="text" name="phone" value="{{ record.phone|default:'' }}">
      </div>
      <div class="form-group">
        <label>Event Title</label>
        <input type="text" name="event_title" value="{{ record.event_title|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Ticket Type</label>
        <select name="ticket_type">
          <option value="general" {% if record.ticket_type == 'general' %}selected{% endif %}>General</option>
          <option value="vip" {% if record.ticket_type == 'vip' %}selected{% endif %}>VIP</option>
          <option value="speaker" {% if record.ticket_type == 'speaker' %}selected{% endif %}>Speaker</option>
          <option value="sponsor" {% if record.ticket_type == 'sponsor' %}selected{% endif %}>Sponsor</option>
        </select>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="registered" {% if record.status == 'registered' %}selected{% endif %}>Registered</option>
          <option value="confirmed" {% if record.status == 'confirmed' %}selected{% endif %}>Confirmed</option>
          <option value="checked_in" {% if record.status == 'checked_in' %}selected{% endif %}>Checked In</option>
          <option value="cancelled" {% if record.status == 'cancelled' %}selected{% endif %}>Cancelled</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Amount Paid</label>
        <input type="number" step="0.01" name="amount_paid" value="{{ record.amount_paid|default:'0' }}">
      </div>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} Attendee</button>
      <a href="/attendees/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
