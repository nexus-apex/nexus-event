{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} Venue | NexusEvent{% endblock %}
{% block page_title %}{% if editing %}Edit Venue{% else %}New Venue{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Name</label>
        <input type="text" name="name" value="{{ record.name|default:'' }}">
      </div>
    </div>
    <div class="form-group">
      <label>Address</label>
      <textarea name="address">{{ record.address|default:'' }}</textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Capacity</label>
        <input type="number" name="capacity" value="{{ record.capacity|default:'0' }}">
      </div>
      <div class="form-group">
        <label>Hourly Rate</label>
        <input type="number" step="0.01" name="hourly_rate" value="{{ record.hourly_rate|default:'0' }}">
      </div>
    </div>
    <div class="form-group">
      <label>Amenities</label>
      <textarea name="amenities">{{ record.amenities|default:'' }}</textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Contact</label>
        <input type="text" name="contact" value="{{ record.contact|default:'' }}">
      </div>
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="available" {% if record.status == 'available' %}selected{% endif %}>Available</option>
          <option value="booked" {% if record.status == 'booked' %}selected{% endif %}>Booked</option>
          <option value="maintenance" {% if record.status == 'maintenance' %}selected{% endif %}>Maintenance</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Phone</label>
        <input type="text" name="phone" value="{{ record.phone|default:'' }}">
      </div>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} Venue</button>
      <a href="/venues/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
